# ============================================================
# SecureLicence — Nginx Server Configuration
# Place in: /etc/nginx/sites-available/securelicence
# Symlink:  ln -s /etc/nginx/sites-available/securelicence /etc/nginx/sites-enabled/
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name securelicence.com www.securelicence.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www → non-www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.securelicence.com;

    ssl_certificate     /etc/letsencrypt/live/securelicence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/securelicence.com/privkey.pem;

    return 301 https://securelicence.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name securelicence.com;

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/securelicence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/securelicence.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Document Root ───────────────────────────────────────
    root /var/www/securelicence/public;
    index index.php;

    # ── Logging ─────────────────────────────────────────────
    access_log /var/log/nginx/securelicence-access.log;
    error_log  /var/log/nginx/securelicence-error.log;

    # ── Request Limits ──────────────────────────────────────
    client_max_body_size 20M;
    client_body_timeout  30s;

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Static Assets (long cache) ──────────────────────────
    location ~* \.(css|js|ico|gif|jpeg|jpg|png|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Vite build assets (fingerprinted, cache forever) ────
    location /build/ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Laravel routing ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ─────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    # ── Block hidden files ──────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ── Block .env and sensitive files ──────────────────────
    location ~* /(\.env|composer\.(json|lock)|package(-lock)?\.json|artisan|phpunit\.xml) {
        deny all;
    }
}
